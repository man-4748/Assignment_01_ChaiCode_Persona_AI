<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChaiCode AI Persona Simulator - Chat with Hitesh & Piyush</title>
  <meta name="description" content="Experience real-time interactive AI chats simulating popular educators Hitesh Choudhary and Piyush Garg. Switch between distinct theme rooms and customize prompts.">
  <link rel="stylesheet" href="style.css">
</head>
<body class="hitesh-theme">

  <!-- Main Grid App Container -->
  <div class="app-container">
    
    <!-- Sidebar Panel -->
    <aside class="sidebar">
      <!-- Logo Brand -->
      <div class="sidebar-header">
        <div class="logo-container">
          <img src="assets/logo.png" alt="ChaiCode Logo" class="chaicode-logo">
        </div>
      </div>

      <!-- Persona Switch Area -->
      <div class="sidebar-section">
        <h3 class="section-title">Select AI Educator</h3>
        
        <!-- Hitesh Card -->
        <div class="persona-card active" id="persona-card-hitesh">
          <div class="persona-avatar-wrapper">
            <img src="assets/hitesh.png" alt="Hitesh Choudhary" class="persona-avatar">
            <span class="status-dot pulsing"></span>
          </div>
          <div class="persona-info">
            <span class="persona-name">Hitesh Choudhary</span>
            <span class="persona-role">Chai aur Code</span>
          </div>
        </div>

        <!-- Piyush Card -->
        <div class="persona-card" id="persona-card-piyush">
          <div class="persona-avatar-wrapper">
            <img src="assets/piyush.png" alt="Piyush Garg" class="persona-avatar">
            <span class="status-dot pulsing"></span>
          </div>
          <div class="persona-info">
            <span class="persona-name">Piyush Garg</span>
            <span class="persona-role">System Design & DevOps</span>
          </div>
        </div>
      </div>

      <!-- Settings and Clear Controls -->
      <div class="sidebar-footer">
        <button class="config-btn" id="config-btn">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
          Settings & Prompt Customizer
        </button>
        <button class="config-btn" id="clear-chat-btn" style="background-color: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.15); color: #fca5a5;">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="stroke: #fca5a5;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
          Clear Chat History
        </button>
      </div>

      <!-- Settings Drawer Modal (Client side, slide-up panel) -->
      <div class="settings-drawer" id="settings-drawer">
        <div class="drawer-header">
          <span class="drawer-title">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:20px;height:20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
            </svg>
            Config settings
          </span>
          <button class="close-drawer-btn" id="close-drawer-btn">&times;</button>
        </div>

        <!-- Provider Switcher -->
        <div class="form-group">
          <label class="form-label" for="api-provider">LLM API Provider</label>
          <select class="form-select" id="api-provider">
            <option value="gemini">Google Gemini API (Recommended)</option>
            <option value="openai">OpenAI API</option>
          </select>
        </div>

        <!-- Gemini Configurations -->
        <div id="gemini-fields">
          <div class="form-group" style="margin-bottom: 12px;">
            <label class="form-label" for="gemini-key">Gemini API Key</label>
            <input class="form-input" type="password" id="gemini-key" placeholder="AIzaSy...">
          </div>
          <div class="form-group">
            <label class="form-label" for="gemini-model">Gemini Model</label>
            <select class="form-select" id="gemini-model">
              <option value="gemini-2.5-flash">gemini-2.5-flash</option>
              <option value="gemini-1.5-flash">gemini-1.5-flash</option>
              <option value="gemini-1.5-pro">gemini-1.5-pro</option>
            </select>
          </div>
        </div>

        <!-- OpenAI Configurations -->
        <div id="openai-fields" style="display: none;">
          <div class="form-group" style="margin-bottom: 12px;">
            <label class="form-label" for="openai-key">OpenAI API Key</label>
            <input class="form-input" type="password" id="openai-key" placeholder="sk-proj-...">
          </div>
          <div class="form-group">
            <label class="form-label" for="openai-model">OpenAI Model</label>
            <select class="form-select" id="openai-model">
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-4o">gpt-4o</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </select>
          </div>
        </div>

        <!-- Save Button -->
        <button class="save-settings-btn" id="save-settings-btn" style="margin-top: auto;">Save Configurations</button>
      </div>
    </aside>

    <!-- Main Chat Window Section -->
    <main class="chat-main">
      
      <!-- Top Header Nav -->
      <header class="chat-header">
        <div class="active-persona-info">
          <img class="header-avatar" id="header-avatar" src="assets/hitesh.png" alt="Persona Avatar">
          <div class="header-meta">
            <span class="header-name" id="header-name">Hitesh Choudhary</span>
            <span class="header-status">
              <span class="header-status-dot"></span>
              <span id="header-status-text">Online</span>
            </span>
          </div>
        </div>

        <!-- Top Right Actions -->
        <div class="chat-actions">
          <a href="https://hitesh.ai/" target="_blank" class="action-icon-btn" title="Visit Educator Website" id="educator-website-link">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-.778.099-1.533.284-2.253m0 0A17.919 17.919 0 0 0 12 10.5a17.97 17.97 0 0 0 8.716-2.253" />
            </svg>
          </a>
        </div>
      </header>

      <!-- Message History Timeline -->
      <section class="chat-timeline" id="chat-timeline">
        <!-- Welcomes/Cards are generated by JavaScript app.js -->
      </section>

      <!-- Chat Bottom Input Panel -->
      <footer class="chat-input-container">
        <div class="chat-input-wrapper">
          <textarea class="chat-textarea" id="chat-input" rows="1" placeholder="Ask anything... (Use Shift+Enter for newlines)"></textarea>
          <button class="send-btn" id="send-btn" title="Send message">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
            </svg>
          </button>
        </div>
        <div class="input-note">
          Simulated chat responses using LLMs. Powered by <a href="#" class="input-note-link">ChaiCode Devs</a>.
        </div>
      </footer>

      <!-- Toast Containers -->
      <div class="toast-container" id="toast-container"></div>
    </main>

  </div>

  <!-- Loading scripts globally in standard order (no CORS file:// issues) -->
  <script src="personas.js?v=1783269203"></script>
  <script src="app.js?v=1783269203"></script>
</body>
</html>
